name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Create keepalive PR
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="keepalive-$(date +%s)"
          git checkout -b $BRANCH
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push origin $BRANCH
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: keepalive [skip ci]"
          branch: keepalive-${{ github.run_id }}
          delete-branch: true
          title: "chore: keepalive - maintain repository activity"
          body: "Automated keepalive commit to maintain repository activity and prevent workflow disablement."
          labels: "automation"
